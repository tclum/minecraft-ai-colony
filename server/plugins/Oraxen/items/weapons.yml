blood_sword:
  itemname: <gradient:#FA7CBB:#F14658>Blood Sword
  material: DIAMOND_SWORD
  lore:
  - <#6f737d>» <#D5D6D8>Steal the life of your enemies
  - <#6f737d>» <#D5D6D8>Make your enemies bleed
  AttributeModifiers:
  - attribute: ATTACK_DAMAGE
    amount: 8
    operation: 0
    slot: HAND
  - attribute: ATTACK_SPEED
    amount: 1.6
    operation: 0
    slot: HAND
  Pack:
    generate_model: false
    model: default/blood_sword
  Mechanics:
    lifeleech:
      amount: 2 # the amount of 1/2 hearts that you'll steal to your opponents
    bleeding:
      chance: 0.3 # 30% chance to apply bleeding on hit
      duration: 100 # bleeding lasts for 100 ticks (5 seconds)
      damage_per_interval: 0.5 # deals 0.5 damage (1/4 heart) per interval
      interval: 20 # damage is applied every 20 ticks (1 second)
  Components:
    durability: 500

